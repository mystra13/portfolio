<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta content="en-us" http-equiv="Content-Language" />
<meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
<title>Tatoos</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico" />

<style type="text/css">
.auto-style1 {
	text-align: center;
}
.auto-style3 {
	font-family: "Lucida Sans", "Lucida Sans Regular", "Lucida Grande", "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
	font-size: large;
}
body {
  background: black;
  color: white;
}

.btn {
  border: none;
  background-color: #8F57AD;
  padding: 14px 28px;
  font-size: 16px;
  cursor: pointer;
  display: inline-block;
}

.btn:hover {background: #38164A;}

.home {color: white;}
.logos {color: white;}
.print {color: white;}
.bands {color: white;}
.backgrounds {color: white;}

.top-container {
  background-color: black;
  padding: 1px;
  text-align: center;
}

.header {
  padding: 1px 1px;
  background: black;
  color: black;
}
#myHeader {
    position: sticky;
    top: 0;
    width: 100%;
    z-index: 1000;
}

.content {
  padding: 1px;
}

.sticky {
  position: fixed;
  top: 0;
  width: 100%;
}

.sticky + .content {
  padding-top: 1px;
}

/* The grid: Seven equal columns that floats next to each other */
.column {
  float: left;
  width: 14%;
  padding: 10px;
}

/* Style the images inside the grid */
.column img {
  opacity: 0.8;
  cursor: pointer;
}

.column img:hover {
  opacity: 1;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* The expanding image container (positioning is needed to position the close button and the text) */
.container {
  position: relative;
  display: none;
}

/* Expanding image text */
#imgtext {
  position: absolute;
  bottom: 15px;
  left: 15px;
  color: black;
  font-size: 20px;
}

/* Closable button inside the image */
.closebtn {
  position: absolute;
  top: 10px;
  right: 15px;
  color: black;
  font-size: 35px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="top-container"></div>
<div class="header" id="myHeader">
<center>
<a href="https://mystra13.github.io/portfolio/index.html"><button class="btn home">Home</button></a>
<a href="https://mystra13.github.io/portfolio/logos.html"><button class="btn logos">Logos</button></a>
<a href="https://mystra13.github.io/portfolio/presentations.html"><button class="btn print">Print &amp; Presentations</button></a>
<a href="https://mystra13.github.io/portfolio/bandwork.html"><button class="btn bands">Bands</button></a>
<a href="https://mystra13.github.io/portfolio/backgrounds.html"><button class="btn backgrounds">Backgrounds</button></a>
</center>
</div>

<div class="content">
<!-- The grid: seven columns -->
<div class="row">
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/cthulhu copy.jpg" alt="Cthulhu" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/jftat3.jpg" alt="Family" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/thelemanew.jpg" alt="Thelema" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/Wasted_Dreams.jpg" alt="Dreams" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/weddingsymbolbwsign.jpg" alt="Wedding" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/wuxingbaguataiji_02.jpg" alt="Wuxing" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="href="https://mystra13.github.io/portfolio/Tattoos/Your_Tears.jpg" alt="Tears" onclick="myFunction(this);">
  </div>
</div>

<!-- The expanding image container -->
<div class="container">
  <!-- Close the image -->
  <span onclick="this.parentElement.style.display='none'" class="closebtn">&times;</span>

  <!-- Expanded image -->
  <img id="expandedImg" style="width:100%">

  <!-- Image text -->
  <div id="imgtext"></div>
</div>
</div>

<script>
window.onscroll = function() {myFunction()};

var header = document.getElementById("myHeader");
var spacer = document.getElementById("headerSpacer");
var sticky = header.offsetTop;

function myFunction() {
  if (window.pageYOffset > sticky) {
    header.classList.add("sticky");
    spacer.style.height = header.offsetHeight + "px";
  } else {
    header.classList.remove("sticky");
    spacer.style.height = "0px";
  }
}
</script>

<script>
function myFunction(imgs) {
  var expandImg = document.getElementById("expandedImg");
  var imgText = document.getElementById("imgtext");
  expandImg.src = imgs.src;
  imgText.innerHTML = imgs.alt;
  expandImg.parentElement.style.display = "block";
}
</script>

</body>

</html>
